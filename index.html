<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gizli Oyuncu | G3 Projects</title>
    <style>
        /* Minecraft Fontuna benzer bir font yükleyelim */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #1a1a1a; 
            /* Arka planı koyu bir taş deseni yapalım */
            background-image: radial-gradient(#2c2c2c 1px, transparent 1px);
            background-size: 20px 20px;
            color: #fff; 
            font-family: 'VT323', monospace; /* Retro oyun fontu */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            /* Granit Bloğu Görünümü */
            background-color: #946358; /* Granit ana rengi */
            background-image: 
                linear-gradient(45deg, rgba(0,0,0,0.1) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(0,0,0,0.1) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(0,0,0,0.1) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(0,0,0,0.1) 75%);
            background-size: 4px 4px;
            border: 6px solid #5d3d36; /* Blok kenarlığı */
            box-shadow: inset -4px -4px 0px #4a312b, inset 4px 4px 0px #bd8478;
            image-rendering: pixelated;
        }

        h1 { 
            font-size: 3rem; 
            color: #ffffff; 
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 25px; 
            letter-spacing: 1px;
        }

        .game-menu { display: flex; flex-direction: column; gap: 15px; }

        .game-card {
            display: block;
            padding: 15px;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            transition: 0.2s;
            border: 4px solid #000;
            background: #7a7a7a;
            box-shadow: inset -4px -4px 0px #4a4a4a, inset 4px 4px 0px #b5b5b5;
            text-shadow: 2px 2px 0px #000;
        }

        /* Hover Efekti - Minecraft buton tıklama hissi */
        .game-card:hover { 
            background: #8c8c8c;
            transform: scale(1.02);
            border-color: #ffffff;
        }

        /* Özel Renkler */
        .valostrike { border-color: #bd3944; }
        .creativemc { border-color: #2e7d32; }
        .mobilecreative { border-color: #ff9800; }

        .credits {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ffeb3b;
            text-shadow: 1px 1px 0px #000;
        }

        .footer { margin-top: 15px; color: #333; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GIZLI OYUNCU</h1>
        
        <div class="game-menu">
            <a href="./ValoStrike/" target="_blank" class="game-card valostrike">
                [ VALOSTRIKE ]
            </a>

            <a href="./CreativeMC/" target="_blank" class="game-card creativemc">
                [ CREATIVEMC ]
            </a>

            <a href="./MobileCreativeMC/" target="_blank" class="game-card mobilecreative">
                [ MOBILE CREATIVE ]
            </a>
        </div>

        <div class="credits">Yapan: Gizlioyuncu3</div>
        <p class="footer">gizlioyuncu3.github.io</p>
    </div>

</body>
</html>
