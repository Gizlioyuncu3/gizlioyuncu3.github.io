<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gizlioyuncu3 | G3 GAMING</title>
    <style>
        /* Minecraft Fontuna benzer bir font yükleyelim */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            /* Orijinal Minecraft Tuğla (Brick) Dokusu */
            background-color: #894b3e; 
            background-image: url('data:image/svg+xml;utf8,<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" fill="%23894b3e"/><rect y="14" width="32" height="2" fill="%23b0a4a0"/><rect y="30" width="32" height="2" fill="%23b0a4a0"/><rect x="14" width="2" height="14" fill="%23b0a4a0"/><rect x="30" y="16" width="2" height="14" fill="%23b0a4a0"/></svg>');
            background-size: 64px 64px;
            image-rendering: pixelated;
            
            color: #fff; 
            font-family: 'VT323', monospace; /* Retro oyun fontu */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            
            /* Orijinal Minecraft Granit Dokusu */
            background-color: #9e6a5f;
            background-image: url('data:image/svg+xml;utf8,<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect width="16" height="16" fill="%239e6a5f"/><rect x="2" y="2" width="2" height="2" fill="%237b4f45"/><rect x="8" y="4" width="4" height="2" fill="%23b28176"/><rect x="12" y="10" width="2" height="2" fill="%237b4f45"/><rect x="4" y="12" width="2" height="4" fill="%23b28176"/><rect x="10" y="2" width="2" height="2" fill="%23663e36"/><rect x="6" y="8" width="2" height="2" fill="%23663e36"/></svg>');
            background-size: 48px 48px;
            image-rendering: pixelated;
            
            border: 6px solid #5d3d36; /* Blok kenarlığı */
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.4), inset 4px 4px 0px rgba(255,255,255,0.2), 10px 10px 20px rgba(0,0,0,0.6);
        }

        h1 { 
            font-size: 3rem; 
            color: #ffffff; 
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 25px; 
            letter-spacing: 1px;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0 15px;
            border-radius: 5px;
        }

        .game-menu { display: flex; flex-direction: column; gap: 15px; }

        .game-card {
            display: block;
            padding: 15px;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            transition: 0.2s;
            border: 4px solid #000;
            background: #7a7a7a;
            box-shadow: inset -4px -4px 0px #4a4a4a, inset 4px 4px 0px #b5b5b5;
            text-shadow: 2px 2px 0px #000;
        }

        /* Hover Efekti - Minecraft buton tıklama hissi */
        .game-card:hover { 
            background: #8c8c8c;
            transform: scale(1.02);
            border-color: #ffffff;
        }

        /* Özel Renkler */
        .valostrike { border-color: #bd3944; }
        .creativemc { border-color: #2e7d32; }
        .mobilecreative { border-color: #ff9800; }
        .mobilevalostrike { border-color: #00bcd4; } /* Yeni oyun için neon mavi */

        .credits {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ffeb3b;
            text-shadow: 2px 2px 0px #000;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .footer { 
            margin-top: 15px; 
            color: #ddd; 
            font-size: 1rem; 
            text-shadow: 1px 1px 0px #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GIZLIOYUNCU3</h1>
        
        <div class="game-menu">
            <a href="./ValoStrike/" target="_blank" class="game-card valostrike">
                [ VALOSTRIKE ]
            </a>

            <a href="./CreativeMC/" target="_blank" class="game-card creativemc">
                [ CREATIVEMC ]
            </a>

            <a href="./MobileCreativeMC/" target="_blank" class="game-card mobilecreative">
                [ MOBILECREATIVEMC ]
            </a>

            <a href="./MobileValoStrike/" target="_blank" class="game-card mobilevalostrike">
                [ MOBILEVALOSTRIKE ]
            </a>
        </div>

        <div class="credits">Yapan: Gizlioyuncu3</div>
        <p class="footer">gizlioyuncu3.github.io</p>
    </div>

</body>
</html>
