<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gizli Oyuncu | G3 Projects</title>
    <style>
        /* Genel Tasarım */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0d0d0d; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Arka Plan Efekti */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0d0d0d 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        /* Başlıklar */
        h1 { font-size: 2rem; margin-bottom: 5px; letter-spacing: 3px; color: #00ff41; }
        .subtitle { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 30px; }

        /* Oyun Butonları Grubu */
        .game-menu { display: flex; flex-direction: column; gap: 20px; }

        .game-card {
            display: block;
            padding: 20px;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ValoStrike Buton Stili */
        .valostrike {
            background: linear-gradient(45deg, #bd3944 0%, #53212b 100%);
            box-shadow: 0 4px 15px rgba(189, 57, 68, 0.3);
        }

        /* CreativeMC Buton Stili */
        .creativemc {
            background: linear-gradient(45deg, #2e7d32 0%, #1b5e20 100%);
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
        }

        .game-card:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        .game-title { font-size: 1.4rem; font-weight: bold; color: #white; display: block; }
        .game-desc { font-size: 0.75rem; color: rgba(255,255,255,0.7); }

        /* Alt Linkler */
        .footer-links { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .social-link { color: #888; text-decoration: none; font-size: 0.9rem; margin: 0 10px; transition: 0.3s; }
        .social-link:hover { color: #00ff41; }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <h1>GIZLI OYUNCU</h1>
        <p class="subtitle">Oyun Portalı - v1.0</p>

        <div class="game-menu">
            <a href="https://gizlioyuncu3.github.io/ValoStrike/" target="_blank" class="game-card valostrike">
                <span class="game-title">🔫 ValoStrike</span>
                <span class="game-desc">Taktiksel FPS Deneyimi</span>
            </a>

            <a href="https://gizlioyuncu3.github.io/CreativeMC/" target="_blank" class="game-card creativemc">
                <span class="game-title">🧱 CreativeMC</span>
                <span class="game-desc">Sınırsız Blok Dünyası</span>
            </a>
        </div>

        <div class="footer-links">
            <a href="https://github.com/gizlioyuncu3" target="_blank" class="social-link">GitHub</a>
            <a href="#" class="social-link">İletişim</a>
        </div>
    </div>

</body>
</html>
